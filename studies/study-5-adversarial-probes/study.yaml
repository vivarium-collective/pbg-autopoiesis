schema_version: 3
name: study-5-adversarial-probes
title: "Adversarial probes — can the framework be fooled?"
created: '2026-06-13'
phase: Evaluate
status: completed
kind: adversarial
study_type: adversarial  # critique #10: explicit workflow type (kind: adversarial kept as alias)
objective: |
  Turn the demonstration into a test: challenge the autopoiesis framework with
  systems that should NOT qualify, and check that the metric REJECTS them. Two
  probes — an externally-maintained mimic (persistence supplied from outside, not
  self-produced) and a network missing a self-production step (no membrane
  producer). The study passes only if the metric rejects both, showing the
  criteria discriminate genuine self-production from superficial similarity.

pipeline_gate:
  prerequisites:
  - study: study-4-growth-division
    condition: tests-passed
  enables: []
  proceed_condition: |
    The framework rejects both adversarial probes — the externally-maintained
    mimic fails precariousness and the incomplete network fails operational
    closure — so the criteria have demonstrated discriminative power.

  gate_evaluator:
    result: passed
    blocked_by: []
    evaluated_by: code
    diverges_from_authored: false
baseline:
- name: adversarial-probes
  composite: pbg_autopoiesis.composites.membrane-metabolism-loop
  params: {supply_rate: 0.0}

behavior_tests:
- name: rejects-external-maintenance
  classification: primary
  description: |
    An externally-maintained mimic (membrane clamped from outside) persists when
    starved; the metric must flag it as NOT precarious, i.e. reject it.
  measure: {kind: derived_scalar, field: external_maintenance_persistence}
  pass_if:
    op: ">="
    value: 3.0
    provenance:
      kind: calibration
      note: >-
        The mimic must be ≥3x more persistent than the self-producing loop when starved
        to count as "rejected" (not precarious); calibrated against the self-producing-loop
        positive control, mirroring study-1's precariousness band.
- name: rejects-broken-closure
  classification: primary
  description: |
    A network missing the membrane producer cannot self-produce its boundary;
    operational closure must leave a non-empty gap, i.e. reject it.
  measure: {kind: derived_scalar, field: broken_network_gap}
  pass_if:
    op: ">"
    value: 0
    provenance:
      kind: theory
      note: >-
        Any non-empty closure gap means a required type is not self-produced, so the
        network is definitionally not operationally closed — the threshold is the
        autopoietic closure definition, not a tuned value.

falsifiability: |
  The framework would FAIL this adversarial test if the externally-maintained
  mimic collapsed like a self-producing loop (precariousness indistinguishable
  from external upkeep), or if the membrane-less network achieved a closed gap —
  i.e. if a superficially-similar or externally-sustained system passed.

# composition_commitment — this study adds no new self-production component; it
# re-tests study-1's loop against adversarial mimics and RE-CHECKS study-1's
# invariants (operational closure + precariousness) in the current code.
# closure_gap_item is auto-filled by the meter (spine) with the gap the membrane
# producer closes in the broken-network probe.
composition_commitment:
  component_added: []
  deficit_addressed:
    note: >-
      Calibrates the operational-closure + precariousness criteria by confronting
      them with systems that should NOT qualify (an externally-maintained mimic and
      a network missing its membrane producer). closure_gap_item is auto-filled with
      the gap the membrane producer closes in the broken probe.
    closure_gap_item:
    - membrane_lipids
  new_behavior:
  - rejects-external-maintenance
  - rejects-broken-closure
  invariants_required:
  - {study: study-1-membrane-metabolism-loop, test: operational-closure}
  - {study: study-1-membrane-metabolism-loop, test: precariousness}
  alternatives_excluded:
  - externally-maintained-mimic
  - missing-self-production-network

alternative_hypotheses:
- claim: "Passing the four constructive studies just shows the criteria were tuned to those models, not
    that they discriminate."
  discriminated_by: "the adversarial probes are constructed to satisfy surface features yet are rejected,
    so the criteria track organization, not the specific models."
  status: excluded

discovery_implications:
  resolved_uncertainties:
  - "The precariousness and closure criteria reject externally-maintained and structurally-incomplete
    systems — they have discriminative power, not just confirmatory fit."
  remaining_uncertainties:
  - "Only two adversarial archetypes are probed; parasitic / partially-dependent and random-cyclic networks
    remain to be tested."
  alternate_hypotheses:
  - hypothesis: "A cleverly-tuned random cyclic network might still score a closed gap."
    hypothesis_id: H-closure-without-viability   # critique #6 — closure-as-bookkeeping link
    why_plausible: "closure is a structural bookkeeping check; a hand-crafted cycle could satisfy it without
      biological meaning."
    discriminating_observables: ["operational_closure gap on a randomly-wired network", "precariousness
        of a parasitic agent that exploits a host"]
  followup_study_proposals:
  - id: parasitic-dependent-probe
    title: "Parasitic / partially-dependent system"
    motivation: "Blur self-production vs dependence (parasites, endosymbionts, reduced genomes) and check
      where the criteria draw the line."
  - id: random-cyclic-network-probe
    title: "Random cyclic network"
    motivation: "Test whether a meaningless cyclic network can be made to score a closed gap (would expose
      closure as mere bookkeeping)."

