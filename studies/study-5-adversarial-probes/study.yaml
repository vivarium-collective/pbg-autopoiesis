findings:
- id: F-01
  kind: structural
  status: confirms
  tier: observation
  statement: 'The framework REJECTS an externally-maintained mimic: clamped from outside it persists when
    starved (precariousness fails), so the metric does not mistake external upkeep for self-production.'
  evidence:
    from_test: rejects-external-maintenance
    observed: 8.9022
    units: persistence vs self-producing loop
  claim_scope: behavioral
- id: F-02
  kind: structural
  status: confirms
  tier: observation
  statement: "The framework REJECTS a network missing self-production: removing the membrane producer
    leaves a non-empty closure gap (['membrane_lipids']), so a structurally-incomplete network does not
    pass operational closure."
  evidence:
    from_test: rejects-broken-closure
    observed: 1.0
    units: types in gap
  claim_scope: mechanism
visualizations: []
robustness:
  parameter_sweep: true
  n_replicates: 5
  seeds:
  - 1.0
  - 1.5
  - 2.0
  - 2.5
  - 3.0
  swept_param: supply_rate
  note: '5/5: the externally-maintained mimic stays non-precarious; the broken-network gap is structural.'
controls:
- name: self-producing-loop
  kind: positive
  hypothesis: The genuine self-producing loop should be ACCEPTED (closed + precarious).
  expected: accepted (gap 0, precarious)
  observed: closure gap 0; collapses when starved
  result: PASS
- name: externally-maintained-mimic
  kind: adversarial
  hypothesis: A system maintained from OUTSIDE mimics persistence but is not self-producing — the 
    metric must REJECT it (precariousness fails).
  expected: persists when starved (not precarious) -> rejected
  observed: 9x more persistent than the self-producing loop when starved
  result: PASS
- name: missing-self-production-network
  kind: adversarial
  hypothesis: A network missing a self-production step (no membrane producer) should FAIL 
    operational closure.
  expected: closure gap non-empty -> rejected
  observed: gap = ['membrane_lipids']
  result: PASS
