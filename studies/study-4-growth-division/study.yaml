discovery_implications:
  resolved_uncertainties:
  - One founder grows and divides into a heterogeneous population (robust across 12 seeds; reaches carrying every seed).
  - 'Division is precarious: daughters that inherit too little membrane dissolve.'
  remaining_uncertainties:
  - Reproduction is ENGINEERED — explicit division, inheritance and partitioning rules — not shown to EMERGE from autopoietic self-maintenance (review C7).
  - No control distinguishing engineered copying from autopoietic self-reproduction.
  alternate_hypotheses:
  - hypothesis: The population growth demonstrates engineered copying, not autopoietic self-reproduction.
    why_plausible: the split/inherit/partition rules are coded, not derived from the membrane/metabolism loop.
    discriminating_observables:
    - "a no-self-maintenance reproduction control: copies that do not metabolise should still 'divide' but not persist"
    - coupling of division rate to self-production rate
  followup_study_proposals:
  - id: engineered-vs-autopoietic-reproduction
    title: Engineered vs autopoietic reproduction (negative control)
    motivation: Show the metric must couple reproduction to self-maintenance — copying without metabolism should not qualify (review C7).
controls:
- name: self-maintaining-lineage
  kind: positive
  hypothesis: A lineage that self-maintains should grow to carrying.
  expected: reaches carrying
  observed: final population 300
  result: PASS
- name: no-self-maintenance-reproduction
  kind: negative
  hypothesis: Reproduction without self-maintenance (no supply) should COLLAPSE — engineered copying alone is not autopoietic.
  expected: lineage collapses
  observed: final population 1 vs 300 when self-maintaining
  result: PASS
falsifiability: The 'reproduction extends autopoiesis' reading would be unsupported if the no-self-maintenance control still reached carrying — i.e. if engineered division persisted without metabolism.
alternative_hypotheses:
- claim: The population growth demonstrates engineered copying, not autopoietic self-reproduction.
  discriminated_by: the no-self-maintenance negative control (supply=0) collapses despite division firing, so persistence requires self-maintenance.
  status: excluded
