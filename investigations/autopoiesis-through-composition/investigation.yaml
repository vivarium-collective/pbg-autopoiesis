competing_frameworks:
- name: active inference / free-energy
  relation: predicts adaptive behaviour (chemotaxis) as surprise minimisation; distinguished here by self-production of the boundary, which active inference treats as given.
- name: organizational / constraint closure (Moreno-Mossio, Montevil)
  relation: closely related — arguably the same claim; our operational-closure gap metric is one discrete operationalisation of closure-of-constraints.
- name: viability theory (Aubin)
  relation: frames persistence as staying inside a viability kernel; precariousness is the dynamical-systems echo of that condition.
