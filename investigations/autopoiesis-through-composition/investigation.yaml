schema_version: 2
name: autopoiesis-through-composition
title: "Autopoiesis through composition"
created: '2026-06-12'
status: active

question: |
  Can a precarious, self-bounding identity — a cell that produces its own boundary —
  be assembled by composing existing parts, and how much of itself does each increment
  produce? Progress is measured, not asserted: by operational closure (the autopoiesis
  meter) and by precariousness (does the identity dissipate when self-production stops?).

executive:
  what_is_this: |
    A whole-cell model built up as a self-producing network, increment by increment.
    The biological schema framework DRIVES acceptance: each study's verdict is the
    autopoiesis meter (operational closure: gap = requires \ provides \ boundary) plus
    the precariousness behavior test. The membrane — the self-produced boundary that
    the whole-cell-modeling lineage models as a given — is the part we build.
  verdict: |
    All four studies PASS their acceptance criteria (12/12). The arc holds: a precarious,
    self-bounding identity is assembled by composition (study 1), confined in space by
    its own membrane (study 2), kept alive by sensing and moving toward food (study 3),
    and made to grow, divide, and diversify into a heterogeneous population (study 4).
    This is a DEMONSTRATION, not yet an adversarial validation: every study was built to
    succeed and none has yet been challenged with a system that should FAIL. The
    demonstration is hardened by the stochastic studies now being 12-seed distributions
    (study 3: 2.33x ± 0.26 survival advantage, 12/12 seeds) rather than single runs.
  verdict_status: passing
  verdict_detail: |
    Per study: (1) closed modulo nutrient (gap = ∅), precarious-but-maintained;
    (2) membrane counters diffusion and contains metabolites; (3) sensing yields a
    robust survival advantage over a blind-motile control — the 'agency / sense-making'
    reading is an INTERPRETATION of an engineered sensing rule, not demonstrated
    cognition; (4) growth/division into a heterogeneous population, but reproduction is
    ENGINEERED, not shown to emerge from autopoietic self-maintenance.

    NEXT PHASE (proposed in each study's discovery_implications; the rigor scorecard
    flags these as open gaps): an ADVERSARIAL study (random-cyclic / externally-
    maintained / mimic systems that should NOT qualify); NEGATIVE CONTROLS (externally-
    maintained membrane, no-self-maintenance reproduction); PARAMETER SWEEPS for the
    deterministic studies 1-2; metric CALIBRATION (a weakly-sensing / borderline case);
    and a parasitic/dependent agent. Comparison to competing lenses (active inference,
    organizational / constraint closure, viability theory) is recorded under
    competing_frameworks. Passing these turns the demonstration into a validation.

studies:
- study-1-membrane-metabolism-loop
- study-2-spatial-containment
- study-3-adaptive-chemotaxis
- study-4-growth-division

