<h1>pbg-autopoiesis &middot; increment 1</h1>
<p class=sub>The minimal membrane/metabolism co-construction loop — a precarious, self-bounding identity that emerges from the molecular domain.</p>
<figure><img src="01_precariousness.png" alt="Precariousness"><figcaption><b>Precariousness.</b> Fed, the self-produced boundary persists through complete material turnover; starved, it dissipates. The identity is a process, not a container.</figcaption></figure>
<figure><img src="02_dynamics.png" alt="Self-maintained dynamics"><figcaption><b>Self-maintained dynamics.</b> Membrane, lipid, precursor, and volume settle into a steady state held against decay by continuous self-production.</figcaption></figure>
<figure><img src="03_emergent_boundary.png" alt="The emergent boundary"><figcaption><b>The emergent boundary.</b> The cell builds its own boundary: volume is derived from membrane lipids, never declared — identity from the molecular domain.</figcaption></figure>
<figure><img src="04_volume_coupling.png" alt="The volume coupling"><figcaption><b>The volume coupling.</b> Lipid synthesis is bimolecular, so it runs on concentration = count/volume: a smaller, more concentrated cell makes lipid faster. Volume is the loop's hinge.</figcaption></figure>
<figure><img src="05_closure_cycle.png" alt="Operational closure"><figcaption><b>Operational closure.</b> The autopoietic meter: the network's provides cover its requires; only nutrient crosses the boundary; the gap is empty.</figcaption></figure>
<figure><img src="06_phase_portrait.png" alt="Phase portrait"><figcaption><b>Phase portrait.</b> The loop's trajectory through (precursor concentration, membrane) space to its self-maintained attractor.</figcaption></figure>
