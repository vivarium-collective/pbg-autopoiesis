name: membrane-metabolism-loop
description: >-
  The minimal membrane/metabolism co-construction loop — a precarious, self-bounding
  identity that emerges from the molecular domain. Metabolism makes lipids; the membrane
  grows by incorporating them and decays without them; the volume is DERIVED from the
  membrane (the boundary emerges, never declared) and couples back into the concentration
  the bimolecular lipid step runs on. Supply (rate=0 starves) is the only boundary inflow.
tags: [autopoiesis, membrane, metabolism, composition, self-production]

requires:
  processes: [Supply, Metabolism, Membrane, Boundary]

parameters:
  supply_rate:
    type: float
    default: 2.0
    description: "Boundary nutrient inflow. 0 starves the cell — the identity then dissipates."

state:
  # --- shared molecular stores (toy counts) ---
  nutrient: 0.0
  precursor: 10.0
  lipid: 0.0
  membrane_lipids: 40.0
  volume: 2.97            # initial emergent boundary = geometry(40 membrane lipids)

  # --- the self-producing network ---
  supply:
    _type: process
    address: "local:Supply"
    config: {rate: "${supply_rate}"}
    interval: 1.0
    inputs: {}
    outputs: {nutrient: [nutrient]}
  metabolism:
    _type: process
    address: "local:Metabolism"
    config: {}
    interval: 1.0
    inputs: {nutrient: [nutrient], precursor: [precursor], lipid: [lipid], volume: [volume]}
    outputs: {nutrient: [nutrient], precursor: [precursor], lipid: [lipid]}
  membrane:
    _type: process
    address: "local:Membrane"
    config: {}
    interval: 1.0
    inputs: {lipid: [lipid], membrane_lipids: [membrane_lipids]}
    outputs: {lipid: [lipid], membrane_lipids: [membrane_lipids]}
  boundary:
    _type: process
    address: "local:Boundary"
    config: {}
    interval: 1.0
    inputs: {membrane_lipids: [membrane_lipids], volume: [volume]}
    outputs: {volume: [volume]}
