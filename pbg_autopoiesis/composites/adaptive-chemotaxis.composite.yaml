name: adaptive-chemotaxis
description: >-
  Study 3 — adaptive chemotaxis: where life becomes mind. A population of
  run-and-tumble agents in a nutrient gradient senses the local food and tumbles
  less when nutrient is rising (bacterial chemotaxis); nutrient sustains the
  viability that keeps each agent alive. A chemotactic agent climbs the gradient,
  finds food, and survives; a blind agent (``chemotactic=false``) random-walks,
  starves, and dissolves. The gradient is MEANINGFUL from the perspective of the
  precarious identity — sense-making, agency in service of self-maintenance.
tags: [autopoiesis, chemotaxis, agency, sense-making, viability, run-and-tumble]

requires:
  processes: [Chemotaxis]

# the agent ensemble is a whole-value (replaced) store
schema:
  agents: tree

parameters:
  chemotactic:
    type: boolean
    default: true
    description: "Sense the gradient and bias tumbling up it. false = the blind-motile control."
  seed:
    type: integer
    default: 0
    description: "RNG seed for the agent ensemble + run-and-tumble draws (deterministic per seed)."

state:
  # --- the whole agent ensemble lives in one tree store (dict of arrays) ---
  agents: {}                # {x, d, V, alive, N_prev} — seeded by the state builder
  n_alive: 80.0             # derived observable: number of agents still alive
  mean_nutrient: 0.0        # derived observable: mean food experienced by survivors

  # --- the run-and-tumble + viability step ---
  chemotaxis:
    _type: process
    address: "local:Chemotaxis"
    config: {chemotactic: "${chemotactic}", seed: "${seed}"}
    interval: 1.0
    inputs: {agents: [agents], n_alive: [n_alive], mean_nutrient: [mean_nutrient]}
    outputs: {agents: [agents], n_alive: [n_alive], mean_nutrient: [mean_nutrient]}
